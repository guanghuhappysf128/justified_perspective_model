#   name: domain_name
#   value: bbl

stack_keys:
  - 
    display_name: Solvable
    content:
      -
        name: solvable
        value: True
  # -
  #   name: solvable
  #   value: False
  - 
    display_name: Proven Unsolvable
    content:
      -
        name: solvable
        value: False
      -
        name: running
        value: SUCC
  - 
    display_name: Timeout
    content:
      -
        name: running
        value: TIMEOUT
