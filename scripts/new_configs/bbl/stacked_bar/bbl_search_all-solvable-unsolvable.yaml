  -
    name : domain_name
    value : bbl
  # -
  #   name : total_goal_size
  #   value : 1
  # -
  #   name: num_of_agents
  #   value: 2

subplot_x:
  name: total_goal_size
  values: []

subplot_y:
  name: num_of_agents
  values:
  -
    2
  -
    3
  -
    4 

bar_x:
    name: search
    values: 
    - bfs
    - bfsdc
    - bfsdcu
    - astar
    - greedy
    # - ngreedy

