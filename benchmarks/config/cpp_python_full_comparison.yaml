suite_name: cpp_python_full_comparison
cores: 30

defaults:
  time_limit_seconds: 100 
  memory_limit_gb: 8
  cpp_max_expanded: 300000

solvers:
  - name: bestfirst
    python_search_path: jp/search_algorithms/best_first.py
    cpp_search: bestfirst
  - name: cbfs
    python_search_path: jp/search_algorithms/cbfs.py
    cpp_search: cbfs
    search_options:
      base_heuristic: goal_counting
      novelty_heuristic: iw_gc
  - name: acps
    python_search_path: jp/search_algorithms/acps.py
    cpp_search: acps
    search_options:
      base_heuristic: goal_counting
      novelty_heuristic: iw_gc
      init: 1
      step: 1
      width_bound: 16
      reset: false
  - name: cabs
    python_search_path: jp/search_algorithms/cabs.py
    cpp_search: cabs
  - name: lnbs
    python_search_path: jp/search_algorithms/lnbs.py
    cpp_search: lnbs
    search_options:
      base_heuristic: goal_counting
      novelty_heuristic: iw_gc
      initial_beam_size: 4
      max_beam_size: 16
      keep_all_layers: true
      seed: 2023
      max_repair_attempts: 6
      cabs_initial_beam_size: 1
      cabs_max_beam_size: 16

domains:
  - name: bbl
    instances: all
  - name: coin
    instances: all
  - name: corridor
    instances: all
  - name: gossip4
    instances: all
  - name: grapevine
    instances: all
  - name: grid
    instances: all
  - name: grid_backup
    instances: all
  - name: muddy_children
    instances: all
  - name: new_corridor
    instances: all
  - name: thief
    instances: all